<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/header.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="container">
        <nav id="navbar">
            <ul class="top navlist">
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-brands fa-pinterest" style="color: rgb(166, 44, 16);"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-solid fa-house"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-regular fa-compass"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-regular fa-folder"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-solid fa-plus"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-regular fa-bell"></i>
                    </a>
                </li>
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-regular fa-message"></i>
                    </a>
                </li>
            </ul>

            <ul class="bottom navlist">
                <li>
                    <a href="#" class="navbar-item">
                        <i class="fa-solid fa-gear" style="color: rgb(0, 0, 0);"></i>
                    </a>
                </li>
            </ul>
        </nav>

        <div class="inner-container">
            <div class="profile-header">
                <div class="top-profile-header">
                    <div class="search-container">

                        <button class="search-btn" type="submit">
                            <i class="fa-solid fa-magnifying-glass" style="color: #62625b;"></i>
                        </button>

                        <input class="search-bar" type="search" placeholder="Pesquisar seus Pins">
                    </div>

                    <div class="profile-picture">
                        <img src="images/profile-picture.jpg" alt="Profile picture">
                        <i class="fa-solid fa-chevron-down" style="color:  #62625b;;"></i>
                    </div>

                </div>
                <div class="bottom-profile-header">
                    <div class="top-subheader">
                        <h1>Suas ideias salvas</h1>
                        <div class="profile-section">
                            <img src="images/profile-picture.jpg" alt="Profile picture">
                            <div class="profile-info">
                                <span>Keysos 見習い</span>
                                <span>Seguindo 0</span>
                            </div>
                            <button class="share-profile btn">Compartilhar perfil</button>
                        </div>
                    </div>
                    <div class="bottom-subheader">
                        <div>
                            <span>Pins</span>
                        </div>
                        <div>
                            <span>Pastas</span>
                        </div>
                        <div>
                            <span>Colagens</span>
                        </div>
                    </div>
                </div>
                <div class="profile-publish">
                    <div class="left-profile-publish">
                        <i class="fa-solid fa-sliders"></i>
                        <button class="btn share-pins">Compartilhadas</button>
                    </div>
                    <div class="right-profile-publish">
                        <button class="red-btn create-pins">Criar</button>
                    </div>
                </div>
            </div>
        </div>


    </div>
</body>

</html>
